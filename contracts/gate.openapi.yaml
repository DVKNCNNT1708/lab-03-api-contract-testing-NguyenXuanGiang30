openapi: 3.0.3
info:
  title: Smart Campus — Core Business & Access Gate API (Pair 03)
  version: 1.0.0
  description: |
    Hợp đồng API giữa Core Business (Consumer) và Access Gate (Provider).
    Core Business truy xuất access logs, trạng thái gate, và thông tin card.
  contact:
    name: Nguyễn Xuân Giang
    email: xuangiang@example.edu.vn
servers:
  - url: http://localhost:4012
    description: Prism mock server for Access Gate
  - url: https://api.campus.local
    description: Smart Campus Network
tags:
  - name: access-logs
    description: Quản lý và truy xuất lịch sử quẹt thẻ
  - name: gates
    description: Quản lý trạng thái cổng
  - name: cards
    description: Quản lý thông tin thẻ
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Kiểm tra trạng thái hoạt động của Access Gate
      description: Trả về trạng thái của service Access Gate để giám sát hoạt động.
      tags: [gates]
      security: []
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [status, service]
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: access-gate

  /access/logs/recent:
    get:
      operationId: getRecentLogs
      summary: Lấy danh sách log quẹt thẻ gần đây
      description: Truy xuất access logs, trả về theo thứ tự mới nhất. Có thể lọc theo thời gian.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/StartTime'
        - $ref: '#/components/parameters/EndTime'
      responses:
        '200':
          description: Danh sách access logs
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items, hasMore]
                properties:
                  items:
                    type: array
                    minItems: 0
                    maxItems: 100
                    items:
                      $ref: '#/components/schemas/AccessEvent'
                  hasMore:
                    type: boolean
              examples:
                recent:
                  value:
                    items:
                      - eventType: ACCESS_CHECK
                        eventId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babd
                        gateId: GATE-01
                        cardId: RFID-2026-001
                        decision: ALLOW
                        timestamp: '2026-05-18T08:01:00Z'
                        operatorNote: "Không có"
                    hasMore: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /access/logs/{logId}:
    get:
      operationId: getLogById
      summary: Lấy chi tiết một log quẹt thẻ
      description: Lấy chi tiết 1 event theo UUID.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/LogId'
      responses:
        '200':
          description: Chi tiết access log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessEvent'
              examples:
                success:
                  value:
                    eventType: ACCESS_CHECK
                    eventId: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babd
                    gateId: GATE-01
                    cardId: RFID-2026-001
                    decision: DENY
                    timestamp: '2026-05-18T09:05:00Z'
                    operatorNote: "Thẻ bị khóa"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Lấy trạng thái của cổng
      description: Truy xuất xem cổng đang mở, đóng, hay gặp sự cố.
      tags: [gates]
      parameters:
        - $ref: '#/components/parameters/GateId'
      responses:
        '200':
          description: Trạng thái hiện tại của cổng
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatus'
              examples:
                normal:
                  value:
                    gateId: GATE-01
                    status: CLOSED
                    lastUpdated: '2026-05-18T09:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /cards/{cardId}:
    get:
      operationId: getCardInfo
      summary: Lấy thông tin định danh thẻ
      description: Kiểm tra xem thẻ có hợp lệ, bị khóa hay hết hạn.
      tags: [cards]
      parameters:
        - $ref: '#/components/parameters/CardId'
      responses:
        '200':
          description: Trạng thái của thẻ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
              examples:
                activeCard:
                  value:
                    cardId: RFID-2026-001
                    status: ACTIVE
                    assignedTo: 0196fb3d-4ad7-7d1e-9f49-5d5148d2babc
                    expiredAt: '2027-01-01T00:00:00Z'
                lockedCard:
                  value:
                    cardId: RFID-2026-002
                    status: LOCKED
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    LogId:
      name: logId
      in: path
      required: true
      description: UUID của log/event.
      schema:
        type: string
        format: uuid
    GateId:
      name: gateId
      in: path
      required: true
      description: Mã định danh cổng.
      schema:
        type: string
        pattern: '^GATE-[0-9]{2}$'
    CardId:
      name: cardId
      in: path
      required: true
      description: Mã thẻ RFID.
      schema:
        type: string
        pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
    Limit:
      name: limit
      in: query
      required: false
      description: Số item tối đa mỗi trang.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    StartTime:
      name: startTime
      in: query
      required: false
      description: Lọc log từ thời điểm này (ISO 8601).
      schema:
        type: string
        format: date-time
    EndTime:
      name: endTime
      in: query
      required: false
      description: Lọc log đến thời điểm này (ISO 8601).
      schema:
        type: string
        format: date-time

  schemas:
    AccessEvent:
      type: object
      additionalProperties: false
      required: [eventType, eventId, gateId, cardId, decision, timestamp]
      properties:
        eventType:
          type: string
          enum: [ACCESS_CHECK]
          description: Loại event.
        eventId:
          type: string
          format: uuid
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'
        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
        decision:
          type: string
          enum: [ALLOW, DENY]
        timestamp:
          type: string
          format: date-time
        operatorNote:
          type: string
          nullable: true
          maxLength: 255
          description: Ghi chú của nhân viên trực nếu có.

    GateStatus:
      type: object
      additionalProperties: false
      required: [gateId, status, lastUpdated]
      properties:
        gateId:
          type: string
          pattern: '^GATE-[0-9]{2}$'
        status:
          type: string
          enum: [OPEN, CLOSED, MAINTENANCE, ERROR]
        lastUpdated:
          type: string
          format: date-time

    Card:
      type: object
      additionalProperties: false
      required: [cardId, status]
      properties:
        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
        status:
          type: string
          enum: [ACTIVE, INACTIVE, LOCKED, LOST]
        assignedTo:
          type: string
          nullable: true
          format: uuid
          description: User ID người sở hữu thẻ, nếu thẻ trắng thì null.
        expiredAt:
          type: string
          nullable: true
          format: date-time
          description: Thời điểm hết hạn của thẻ.

    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          example: https://campus.local/errors/validation
        title:
          type: string
          minLength: 3
          maxLength: 120
          example: Dữ liệu không hợp lệ
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: string
          nullable: true
          maxLength: 500
          example: Tham số không đúng định dạng
        instance:
          type: string
          nullable: true
          format: uri
        errors:
          type: array
          minItems: 0
          maxItems: 50
          items:
            type: object
            additionalProperties: false
            required: [field, code, message]
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string

  responses:
    BadRequest:
      description: Dữ liệu request sai định dạng
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/validation
            title: Bad Request
            status: 400
            detail: Tham số query sai kiểu dữ liệu
    Unauthorized:
      description: Thiếu hoặc sai token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/unauthorized
            title: Unauthorized
            status: 401
    NotFound:
      description: Resource không tồn tại
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/not-found
            title: Not Found
            status: 404
            detail: Không tìm thấy ID tương ứng
    UnprocessableEntity:
      description: Dữ liệu vi phạm nghiệp vụ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/unprocessable
            title: Unprocessable Entity
            status: 422
            detail: startTime không được lớn hơn endTime
    InternalServerError:
      description: Lỗi hệ thống nội bộ
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/internal
            title: Internal Server Error
            status: 500
