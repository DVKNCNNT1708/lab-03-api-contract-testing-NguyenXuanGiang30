name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism Mock and Run Newman contract tests
        run: |
          npx prism mock contracts/gate.openapi.yaml -p 4012 --host 0.0.0.0 > prism-gate.log 2>&1 &
          echo "Waiting for Access Gate mock server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:4012/health > /dev/null; then
              echo "Mock server started successfully on port 4012!"
              curl -s http://localhost:4012/health
              break
            fi
            echo "Waiting... ($i)"
            sleep 1
          done
          if ! curl -s http://localhost:4012/health > /dev/null; then
            echo "=== ERROR: Access Gate mock server failed to start! ==="
            cat prism-gate.log
            exit 1
          fi
          npm run test:gate-mock
          npm run test:gate-html || true

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-gate.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
