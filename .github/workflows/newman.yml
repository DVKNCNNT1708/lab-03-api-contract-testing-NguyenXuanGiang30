name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism Mock and Run Newman contract tests
        run: |
          nohup npm run mock:gate > prism-gate.log 2>&1 &
          npx wait-on http://localhost:4012/health --timeout 30000
          npm run test:gate-mock
          npm run test:gate-html || true

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-gate.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
